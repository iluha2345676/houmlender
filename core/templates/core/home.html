{% extends 'base.html' %}

{% block content %}
<!-- Полотно для сузір'я -->
<canvas id="stars-canvas"></canvas>

<!-- Всі стилі прямо тут, щоб уникнути білого екрана -->
<style>
    body {
        background-color: #0d0d0d !important;
        margin: 0;
        font-family: 'Segoe UI', sans-serif;
        overflow-x: hidden;
    }

    #stars-canvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -1; /* Фон позаду всього */
        pointer-events: none;
    }

    /* Навігація */
    nav {
        background-color: rgba(0, 0, 0, 0.8) !important;
        backdrop-filter: blur(10px);
        padding: 15px 30px;
        display: flex;
        justify-content: flex-start;
        align-items: center;
        gap: 20px;
        border-bottom: 1px solid #1a1a1a;
        position: relative;
        z-index: 10;
    }

    nav a {
        color: #ffffff;
        text-decoration: none;
        font-weight: 600;
        font-size: 15px;
        transition: color 0.3s ease;
        padding: 5px 10px;
    }

    nav a:hover { color: #fe2c55; }

    nav a:first-child {
        font-size: 20px;
        font-weight: bold;
        background: linear-gradient(45deg, #fe2c55, #25f4ee);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-right: auto;
    }

    hr { display: none; }

    /* Картка */
    .home-container {
        position: relative;
        z-index: 5;
        max-width: 500px;
        margin: 100px auto;
        padding: 30px;
        background-color: rgba(30, 30, 30, 0.85);
        backdrop-filter: blur(15px);
        border-radius: 16px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.7);
        color: #ffffff;
    }

    .home-container h1 {
        font-size: 28px;
        margin-bottom: 8px;
        background: linear-gradient(45deg, #fe2c55, #25f4ee);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }

    .home-container p { font-size: 14px; color: #cccccc; margin-bottom: 25px; }
    .home-container h2 { font-size: 18px; margin-top: 25px; color: #25f4ee; border-left: 4px solid #fe2c55; padding-left: 10px; margin-bottom: 15px; }

    .feature-list { list-style: none; padding: 0; margin: 0; }
    .feature-list li {
        background-color: rgba(44, 44, 44, 0.6);
        margin-bottom: 10px;
        padding: 12px 15px;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 500;
        display: flex;
        align-items: center;
        transition: transform 0.2s ease, background-color 0.2s ease;
    }

    .feature-list li:before { content: '+'; color: #fe2c55; margin-right: 10px; font-size: 18px; font-weight: bold; }
    .feature-list li:hover { transform: translateX(5px); background-color: rgba(56, 56, 56, 0.8); cursor: pointer; }
</style>

<div class="home-container">
    <h1>Welcome to MiniTok</h1>
    <p>This is my first TikTok-style project.</p>
    <h2>What can you do here?</h2>
    <ul class="feature-list">
        <li>Watch videos</li>
        <li>Upload videos</li>
        <li>Like videos</li>
        <li>Write comments</li>
    </ul>
</div>

<!-- Скрипт взаємодії (точки на своїх місцях і розбігаються) -->
<script>
    const canvas = document.getElementById('stars-canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    const particleCount = 150;
    const mouse = { x: null, y: null, radius: 100 };

    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; init(); }
    window.addEventListener('resize', resize);

    window.addEventListener('mousemove', (e) => { mouse.x = e.clientX; mouse.y = e.clientY; });
    window.addEventListener('mouseout', () => { mouse.x = null; mouse.y = null; });

    class Particle {
        constructor(x, y) {
            this.x = x;
            this.y = y;
            this.baseX = x;
            this.baseY = y;
            this.size = Math.random() * 2 + 1;
            this.ease = 0.05;
        }
        update() {
            if (mouse.x !== null && mouse.y !== null) {
                let dx = mouse.x - this.x;
                let dy = mouse.y - this.y;
                let dist = Math.sqrt(dx * dx + dy * dy);

                if (dist < mouse.radius) {
                    let force = (mouse.radius - dist) / mouse.radius;
                    let moveX = (dx / dist) * force * 10;
                    let moveY = (dy / dist) * force * 10;
                    this.x -= moveX;
                    this.y -= moveY;
                } else {
                    this.x += (this.baseX - this.x) * this.ease;
                    this.y += (this.baseY - this.y) * this.ease;
                }
            } else {
                this.x += (this.baseX - this.x) * this.ease;
                this.y += (this.baseY - this.y) * this.ease;
            }
        }
        draw() { ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fillStyle = '#25f4ee'; ctx.fill(); }
    }

    function init() {
        particles = [];
        for (let i = 0; i < particleCount; i++) {
            let x = Math.random() * canvas.width;
            let y = Math.random() * canvas.height;
            particles.push(new Particle(x, y));
        }
    }
    init();

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        for (let i = 0; i < particles.length; i++) {
            particles[i].update();
            particles[i].draw();
            for (let j = i + 1; j < particles.length; j++) {
                let dx = particles[i].x - particles[j].x;
                let dy = particles[i].y - particles[j].y;
                let dist = Math.sqrt(dx * dx + dy * dy);

                if (dist < 60 && mouse.x !== null) {
                    let dxM = mouse.x - particles[i].x;
                    let dyM = mouse.y - particles[i].y;
                    let distM = Math.sqrt(dxM * dxM + dyM * dyM);

                    if (distM < mouse.radius) {
                        ctx.beginPath();
                        ctx.strokeStyle = `rgba(254, 44, 85, ${1 - dist / 60})`;
                        ctx.lineWidth = 0.5;
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }
            }
        }
        requestAnimationFrame(animate);
    }
    animate();
</script>
{% endblock %}
