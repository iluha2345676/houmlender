{% block content %}

<section class="profile-page">
    <div class="profile-card">
        <div class="avatar-circle">
            {{ user.username|first|upper }}
        </div>

        <h1>{{ user.username }}</h1>

        {% if profile.bio %}
            <p>{{ profile.bio }}</p>
        {% else %}
            <p>No bio yet.</p>
        {% endif %}
    </div>
</section>

{% endblock %}
